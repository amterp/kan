default_column = "backlog-hi"
id = "2R9nzEvz"
kan_schema = "board/11"
name = "main"

[card_display]
  tint = "tint"
  type_indicator = "type"

[[columns]]
  color = "#9333ea"
  description = "Lower priority backlog items"
  limit = 0
  name = "backlog-lo"

[[columns]]
  color = "#6b7280"
  description = "Higher priority items ready to be picked up soon"
  limit = 10
  name = "backlog-hi"

[[columns]]
  color = "#3b82f6"
  description = "This is a much longer description that might wrap across multiple lines and we need to see how it renders in the terminal output to ensure it doesn't cause formatting issues"
  limit = 5
  name = "next"

[[columns]]
  color = "#f59e0b"
  description = "Currently being worked on"
  limit = 5
  name = "in-progress"

[[columns]]
  color = "#10b981"
  description = "Completed and shipped"
  limit = 0
  name = "done"

[custom_fields]
  [custom_fields.type]
    description = "The category of work this card represents"
    type = "enum"
    wanted = true

    [[custom_fields.type.options]]
      color = "#dc2626"
      description = "Something that's broken and needs fixing"
      value = "bug"

    [[custom_fields.type.options]]
      color = "#2563eb"
      description = "Improvement to existing functionality"
      value = "enhancement"

    [[custom_fields.type.options]]
      color = "#16a34a"
      description = "New functionality or capability"
      value = "feature"

    [[custom_fields.type.options]]
      color = "#4b5563"
      description = "Maintenance, refactoring, or tooling work"
      value = "chore"

  [custom_fields.tint]
    description = "Card background tint color"
    type = "enum"

    [[custom_fields.tint.options]]
      color = "#ef4444"
      value = "red"

    [[custom_fields.tint.options]]
      color = "#f59e0b"
      value = "amber"

    [[custom_fields.tint.options]]
      color = "#22c55e"
      value = "green"

    [[custom_fields.tint.options]]
      color = "#3b82f6"
      value = "blue"

    [[custom_fields.tint.options]]
      color = "#a855f7"
      value = "purple"

[[pattern_hooks]]
  command = ".kan/hooks/type-shortcut.rad"
  name = "type-shortcut"
  pattern_title = "![a-zA-Z]+"
  timeout = 0
