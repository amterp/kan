name: PR Summary Comment

# Posts/updates a sticky PR comment with the embedded frontend bundle size (and delta
# vs the base branch) plus whether the committed dist reproduces from source. Split
# from CI via workflow_run so it works on fork PRs: the CI run (read-only token)
# uploads a result artifact, and this workflow - running in the base repo with write
# permission - reads it and comments. It checks out only the trusted base branch (also
# the source for the base bundle size) and never executes PR code.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Checkout base branch (trusted scripts + base bundle)
        uses: actions/checkout@v4

      - name: Download dist-check artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dist-check
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist-check

      - name: Gather metrics
        id: meta
        run: |
          if [ ! -f dist-check/status.txt ]; then
            echo "state=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr=$(cat dist-check/pr-number.txt)" >> "$GITHUB_OUTPUT"
          if grep -q stale dist-check/status.txt; then
            echo "state=stale" >> "$GITHUB_OUTPUT"
          else
            echo "state=ok" >> "$GITHUB_OUTPUT"
          fi
          echo "pr_js=$(cat dist-check/pr-js-bytes.txt)" >> "$GITHUB_OUTPUT"
          echo "pr_css=$(cat dist-check/pr-css-bytes.txt)" >> "$GITHUB_OUTPUT"
          # Base bundle sizes from the committed blobs on the checked-out base branch.
          ls_out="$(git ls-tree -r -l HEAD -- internal/api/dist/assets)"
          echo "base_js=$(echo "$ls_out" | awk '$5 ~ /\.js$/ {s+=$4} END{print s+0}')" >> "$GITHUB_OUTPUT"
          echo "base_css=$(echo "$ls_out" | awk '$5 ~ /\.css$/ {s+=$4} END{print s+0}')" >> "$GITHUB_OUTPUT"

      - name: Install Rad
        if: steps.meta.outputs.state != 'none'
        run: ./ci/install-rad.sh

      - name: Generate summary (Rad)
        if: steps.meta.outputs.state != 'none'
        env:
          PR_JS_BYTES: ${{ steps.meta.outputs.pr_js }}
          PR_CSS_BYTES: ${{ steps.meta.outputs.pr_css }}
          BASE_JS_BYTES: ${{ steps.meta.outputs.base_js }}
          BASE_CSS_BYTES: ${{ steps.meta.outputs.base_css }}
          DIST_STATE: ${{ steps.meta.outputs.state }}
        run: rad ci/pr-summary.rad

      - name: Post or update sticky comment
        if: steps.meta.outputs.state != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Must match the marker emitted by ci/pr-summary.rad - it's how we find and
            // update our own sticky comment. Keep the two in sync.
            const marker = '<!-- kan-ci-pr-summary -->';
            const prNumber = parseInt('${{ steps.meta.outputs.pr }}', 10);
            if (!prNumber) {
              core.info('No PR number in artifact; nothing to do.');
              return;
            }
            const body = fs.readFileSync('/tmp/pr-summary.md', 'utf8');
            // Paginate so the marker is found even on PRs with >100 comments.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
